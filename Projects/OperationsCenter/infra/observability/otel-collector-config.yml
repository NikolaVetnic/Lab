# OpenTelemetry Collector configuration for local Operations Center development.
#
# Pipeline: receive OTLP from the API, batch, then:
#   - metrics  -> Prometheus scrape endpoint (:8889)
#   - traces   -> debug exporter (collector stdout) — no trace storage backend yet
#   - logs     -> Seq (native OTLP log ingestion) and debug exporter
#
# This configuration is vendor-neutral: it exports to no external SaaS and needs no
# credentials.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Metrics are re-exposed as a Prometheus scrape target at :8889/metrics.
  prometheus:
    endpoint: 0.0.0.0:8889
  # Traces are only printed to the collector log for now (no trace storage backend yet).
  debug:
    verbosity: basic
  # Seq (2024.3+) accepts OTLP logs natively at /ingest/otlp/v1/logs. The otlphttp
  # exporter appends /v1/logs to this base endpoint automatically, so no Seq-specific
  # exporter is needed. Default retry/sending-queue behavior means a down Seq instance
  # just queues/drops at the collector without affecting the API.
  otlp_http/seq:
    endpoint: http://operations-center-seq/ingest/otlp

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp_http/seq]
