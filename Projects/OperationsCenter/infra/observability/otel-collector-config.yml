# OpenTelemetry Collector configuration for local Operations Center development.
#
# Pipeline: receive OTLP from the API, batch, then expose metrics on a Prometheus
# scrape endpoint. Traces and logs are sent to the debug exporter (collector stdout)
# so nothing is silently dropped until dedicated trace/log backends are introduced.
#
# This configuration is vendor-neutral: it exports to no external SaaS and needs no
# credentials.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Metrics are re-exposed as a Prometheus scrape target at :8889/metrics.
  prometheus:
    endpoint: 0.0.0.0:8889
  # Traces and logs are only printed to the collector log for now (no storage backend yet).
  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
