# Example Secrets for local/demo use only. Values below are the SAME dev-only
# defaults already checked into .env.example at the repo root — never real
# credentials, never used outside local development.
#
# Copy this file before editing:
#   cp infra/k8s/secrets/secrets.example.yaml infra/k8s/secrets/secrets.local.yaml
# Edit secrets.local.yaml with your own values, then:
#   kubectl apply -f infra/k8s/secrets/secrets.local.yaml
# secrets.local.yaml is git-ignored (see infra/k8s/README.md) so local edits are
# never committed.
#
# These manifests use `stringData` (plain text) rather than `data` (base64) so the
# example values are readable in a diff. Kubernetes base64-encodes stringData values
# itself on apply. If you prefer `data:` with pre-encoded values instead, generate
# them with:
#   echo -n 'your-value' | base64
# and paste the result under `data:` for that key.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: operations-center
type: Opaque
stringData:
  POSTGRES_PASSWORD: operations_center
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: operations-center
type: Opaque
stringData:
  Jwt__SigningKey: development-only-signing-key-change-me
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: operations-center
type: Opaque
stringData:
  GF_SECURITY_ADMIN_PASSWORD: admin
---
apiVersion: v1
kind: Secret
metadata:
  name: dev-seed-secret
  namespace: operations-center
type: Opaque
stringData:
  DEV_SEED_ADMIN_PASSWORD: Admin123!
  DEV_SEED_OPERATOR_PASSWORD: Operator123!
  DEV_SEED_VIEWER_PASSWORD: Viewer123!
