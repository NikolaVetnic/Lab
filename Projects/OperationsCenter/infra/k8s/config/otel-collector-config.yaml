apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: operations-center
data:
  # Identical to infra/observability/otel-collector-config.yml. Hostnames below
  # (operations-center-seq, operations-center-tempo) are resolved by Kubernetes
  # cluster DNS against the Services defined in infra/k8s/observability/, which
  # are deliberately named to match — see infra/k8s/README.md.
  otel-collector-config.yml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

    exporters:
      # Metrics are re-exposed as a Prometheus scrape target at :8889/metrics.
      prometheus:
        endpoint: 0.0.0.0:8889
      # Printed to the collector log so nothing is silently dropped during troubleshooting.
      debug:
        verbosity: basic
      # Seq (2024.3+) accepts OTLP logs natively at /ingest/otlp/v1/logs. The otlp_http
      # exporter appends /v1/logs to this base endpoint automatically, so no Seq-specific
      # exporter is needed. Default retry/sending-queue behavior means a down Seq instance
      # just queues/drops at the collector without affecting the API.
      otlp_http/seq:
        endpoint: http://operations-center-seq/ingest/otlp
      # Tempo runs single-binary local mode with its own OTLP gRPC receiver. No TLS is
      # configured on either side, so the exporter connects insecurely (plain gRPC).
      # Default retry/sending-queue behavior means a down Tempo instance just
      # queues/drops at the collector without affecting the API.
      otlp_grpc/tempo:
        endpoint: operations-center-tempo:4317
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlp_grpc/tempo]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlp_http/seq]
