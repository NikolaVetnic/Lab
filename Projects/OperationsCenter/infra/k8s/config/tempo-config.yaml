apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: operations-center
data:
  # Identical to infra/observability/tempo.yml. Single-binary, local-storage mode,
  # same as the Docker Compose setup.
  tempo.yml: |
    usage_report:
      reporting_enabled: false

    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 1h

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
