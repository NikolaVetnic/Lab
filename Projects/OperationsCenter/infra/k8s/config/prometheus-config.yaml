apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: operations-center
data:
  # Identical to infra/observability/prometheus.yml. The target uses the Kubernetes
  # Service name for the Collector (see infra/k8s/README.md for the DNS naming decision).
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: otel-collector
        static_configs:
          - targets: ['operations-center-otel-collector:8889']
