apiVersion: apps/v1
kind: Deployment
metadata:
  name: operations-center-otel-collector
  namespace: operations-center
  labels:
    app: operations-center-otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: operations-center-otel-collector
  template:
    metadata:
      labels:
        app: operations-center-otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.156.0
          args:
            - --config=/etc/otel-collector-config.yml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: prom-scrape
              containerPort: 8889
          volumeMounts:
            - name: config
              mountPath: /etc/otel-collector-config.yml
              subPath: otel-collector-config.yml
              readOnly: true
          # No health_check extension is configured (matches
          # infra/observability/otel-collector-config.yml exactly), so there is no
          # HTTP health endpoint to probe. A TCP probe against the OTLP receiver
          # confirms the process is accepting connections without depending on an
          # endpoint that doesn't exist.
          readinessProbe:
            tcpSocket:
              port: 4317
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 4317
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
