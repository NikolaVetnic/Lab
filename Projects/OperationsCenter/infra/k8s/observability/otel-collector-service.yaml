# Named to match the Docker Compose service name — see infra/k8s/README.md.
apiVersion: v1
kind: Service
metadata:
  name: operations-center-otel-collector
  namespace: operations-center
spec:
  type: ClusterIP
  selector:
    app: operations-center-otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: prom-scrape
      port: 8889
      targetPort: 8889
