apiVersion: apps/v1
kind: Deployment
metadata:
  name: operations-center-grafana
  namespace: operations-center
  labels:
    app: operations-center-grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: operations-center-grafana
  template:
    metadata:
      labels:
        app: operations-center-grafana
    spec:
      # The official Grafana image runs as UID 472; fsGroup makes the PVC writable
      # by that user on first mount.
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      containers:
        - name: grafana
          image: grafana/grafana-oss:11.4.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: GF_SECURITY_ADMIN_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: 'false'
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
              readOnly: true
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
              readOnly: true
            - name: dashboard-operations-center
              mountPath: /var/lib/grafana/dashboards/operations-center-overview.json
              subPath: operations-center-overview.json
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: dashboard-operations-center
          configMap:
            name: grafana-dashboard-operations-center
        - name: data
          persistentVolumeClaim:
            claimName: operations-center-grafana-data
