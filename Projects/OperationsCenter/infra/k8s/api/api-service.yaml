# Named to match the Docker Compose service name so the web image's baked-in
# nginx.conf (proxy_pass http://operations-center-api:8080) resolves via Kubernetes
# cluster DNS with no changes to the image. See infra/k8s/README.md.
apiVersion: v1
kind: Service
metadata:
  name: operations-center-api
  namespace: operations-center
spec:
  type: ClusterIP
  selector:
    app: operations-center-api
  ports:
    - port: 8080
      targetPort: 8080
