# Runs EF Core migrations once, before the API Deployment is expected to serve
# traffic. Uses the API image's `--migrate` mode (Program.cs / MigrationModeExtensions),
# which only calls dbContext.Database.MigrateAsync() and exits — no dev-data seeding.
#
# Safe to re-run locally: re-applying migrations against an already-migrated database
# is a no-op. A completed Job's spec is immutable, so `kubectl apply` on an unchanged
# file will fail with "field is immutable" if the Job already exists — delete it first:
#   kubectl delete job -n operations-center operations-center-api-migrate --ignore-not-found
#   kubectl apply -f infra/k8s/api/api-migrations-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: operations-center-api-migrate
  namespace: operations-center
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: operations-center-api:local
          imagePullPolicy: IfNotPresent
          args:
            - --migrate
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__OperationsCenterDatabase
              value: Host=operations-center-postgres;Port=5432;Database=$(POSTGRES_DB);Username=$(POSTGRES_USER);Password=$(POSTGRES_PASSWORD)
            - name: Jwt__SigningKey
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: Jwt__SigningKey
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir: {}
