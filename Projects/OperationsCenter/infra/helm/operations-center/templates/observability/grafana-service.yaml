{{- if .Values.observability.grafana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "operations-center.fullname" . }}-grafana
  labels:
    {{- include "operations-center.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: ClusterIP
  selector:
    {{- include "operations-center.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  ports:
    - port: {{ .Values.observability.grafana.service.port }}
      targetPort: 3000
{{- end }}
