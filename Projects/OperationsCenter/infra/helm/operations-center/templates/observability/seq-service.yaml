{{- if .Values.observability.seq.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "operations-center.fullname" . }}-seq
  labels:
    {{- include "operations-center.labels" . | nindent 4 }}
    app.kubernetes.io/component: seq
spec:
  type: ClusterIP
  selector:
    {{- include "operations-center.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: seq
  ports:
    - port: {{ .Values.observability.seq.service.port }}
      targetPort: 80
{{- end }}
