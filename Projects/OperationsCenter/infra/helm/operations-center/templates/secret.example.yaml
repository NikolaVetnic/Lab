# Templates the chart's own Secrets from values — LOCAL/DEMO USE ONLY.
#
# values.yaml ships every field below as a "CHANGE_ME" placeholder; the actual
# dev-only defaults live in values.local.yaml (same values already checked
# into .env.example / infra/k8s/secrets/secrets.example.yaml). For anything
# beyond local development, either override these values with your own
# (--set or your own values file), or set the matching `existingSecret` value
# and point it at a Secret you manage separately — either way, nothing here
# should be relied on as-is outside a local/demo environment.
#
# Each Secret below is only rendered when its existingSecret override is NOT
# set — see _helpers.tpl's *.secretName helpers for the resolution order.
{{- if and .Values.postgres.enabled (not .Values.postgres.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "operations-center.postgres.secretName" . }}
  labels:
    {{- include "operations-center.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
{{- end }}
---
{{- if and .Values.api.enabled (not .Values.api.jwt.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "operations-center.jwt.secretName" . }}
  labels:
    {{- include "operations-center.labels" . | nindent 4 }}
type: Opaque
stringData:
  Jwt__SigningKey: {{ .Values.api.jwt.signingKey | quote }}
{{- end }}
---
{{- if and .Values.observability.grafana.enabled (not .Values.observability.grafana.admin.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "operations-center.grafana.secretName" . }}
  labels:
    {{- include "operations-center.labels" . | nindent 4 }}
type: Opaque
stringData:
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.observability.grafana.admin.password | quote }}
{{- end }}
---
{{- if and .Values.seedJob.enabled (not .Values.seedJob.seedPasswords.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "operations-center.seed.secretName" . }}
  labels:
    {{- include "operations-center.labels" . | nindent 4 }}
type: Opaque
stringData:
  DEV_SEED_ADMIN_PASSWORD: {{ .Values.seedJob.seedPasswords.admin | quote }}
  DEV_SEED_OPERATOR_PASSWORD: {{ .Values.seedJob.seedPasswords.operator | quote }}
  DEV_SEED_VIEWER_PASSWORD: {{ .Values.seedJob.seedPasswords.viewer | quote }}
{{- end }}
