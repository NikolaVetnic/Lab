{{- if and .Values.api.enabled .Values.migration.enabled }}
# Runs EF Core migrations via the API image's `--migrate` mode (only calls
# dbContext.Database.MigrateAsync() and exits — no EnsureCreated(), no
# dev-data seeding). See the chart README's "Migrations" section for why this
# is a Helm hook rather than a plain Job, and the tradeoffs of that choice.
#
# - helm.sh/hook: pre-install,pre-upgrade — runs before every install/upgrade,
#   blocking the release until it completes.
# - helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded — deletes
#   any previous run's completed Job right before creating a new one (this is
#   what avoids the "field is immutable" error a plain Job would hit on the
#   second upgrade), and deletes this run's Job once it succeeds, so
#   completed migration Jobs don't pile up release after release. A FAILED
#   run is deliberately left in place (not in this policy) so you can
#   `kubectl logs`/`describe` it before the next install/upgrade attempt
#   cleans it up.
# - The initContainer exists because hooks run before this release's other
#   templates are guaranteed ready — on a first install, the postgres
#   Deployment may not have a healthy Pod behind its Service yet.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "operations-center.fullname" . }}-api-migrate
  labels:
    {{- include "operations-center.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: '0'
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "operations-center.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: '{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}'
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "operations-center.fullname" . }}-postgres -p {{ .Values.postgres.service.port }}; do
                echo "waiting for postgres..."
                sleep 2
              done
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: migrate
          image: '{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}'
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - --migrate
          envFrom:
            - configMapRef:
                name: {{ include "operations-center.fullname" . }}-api-config
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "operations-center.postgres.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__OperationsCenterDatabase
              value: Host={{ include "operations-center.fullname" . }}-postgres;Port={{ .Values.postgres.service.port }};Database=$(POSTGRES_DB);Username=$(POSTGRES_USER);Password=$(POSTGRES_PASSWORD)
            - name: Jwt__SigningKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "operations-center.jwt.secretName" . }}
                  key: Jwt__SigningKey
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
