services:
  operations-center-postgres:
    image: postgres:17-alpine
    container_name: operations-center-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-operations_center}
      POSTGRES_USER: ${POSTGRES_USER:-operations_center}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-operations_center}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - operations-center-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  operations-center-migrations:
    image: operations-center-api:local
    build:
      context: .
      dockerfile: apps/api/operations-center/Dockerfile
    container_name: operations-center-migrations
    depends_on:
      operations-center-postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ConnectionStrings__OperationsCenterDatabase: Host=operations-center-postgres;Port=5432;Database=${POSTGRES_DB:-operations_center};Username=${POSTGRES_USER:-operations_center};Password=${POSTGRES_PASSWORD:-operations_center}
      Jwt__Issuer: ${Jwt__Issuer:-OperationsCenter.Dev}
      Jwt__Audience: ${Jwt__Audience:-OperationsCenter.Api}
      Jwt__SigningKey: ${Jwt__SigningKey:-development-only-signing-key-change-me}
      Jwt__AccessTokenExpiryMinutes: ${Jwt__AccessTokenExpiryMinutes:-180}
      DEV_SEED_ADMIN_PASSWORD: ${DEV_SEED_ADMIN_PASSWORD:-Admin123!}
      DEV_SEED_OPERATOR_PASSWORD: ${DEV_SEED_OPERATOR_PASSWORD:-Operator123!}
      DEV_SEED_VIEWER_PASSWORD: ${DEV_SEED_VIEWER_PASSWORD:-Viewer123!}
    command: ['--seed']
    restart: 'no'

  operations-center-api:
    image: operations-center-api:local
    build:
      context: .
      dockerfile: apps/api/operations-center/Dockerfile
    container_name: operations-center-api
    restart: unless-stopped
    depends_on:
      operations-center-postgres:
        condition: service_healthy
      operations-center-migrations:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ConnectionStrings__OperationsCenterDatabase: Host=operations-center-postgres;Port=5432;Database=${POSTGRES_DB:-operations_center};Username=${POSTGRES_USER:-operations_center};Password=${POSTGRES_PASSWORD:-operations_center}
      Jwt__Issuer: ${Jwt__Issuer:-OperationsCenter.Dev}
      Jwt__Audience: ${Jwt__Audience:-OperationsCenter.Api}
      Jwt__SigningKey: ${Jwt__SigningKey:-development-only-signing-key-change-me}
      Jwt__AccessTokenExpiryMinutes: ${Jwt__AccessTokenExpiryMinutes:-180}
      # Telemetry is enabled in the containerized stack and pushed to the OpenTelemetry
      # Collector over OTLP. The API stays up even if the Collector is unavailable.
      OpenTelemetry__Enabled: ${OpenTelemetry__Enabled:-true}
      OpenTelemetry__ServiceName: ${OpenTelemetry__ServiceName:-operations-center-api}
      OpenTelemetry__ServiceVersion: ${OpenTelemetry__ServiceVersion:-1.0.0}
      OpenTelemetry__OtlpEndpoint: ${OpenTelemetry__OtlpEndpoint:-http://operations-center-otel-collector:4317}
    ports:
      - '${API_PORT:-5000}:8080'

  operations-center-web:
    image: operations-center-web:local
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: operations-center-web
    restart: unless-stopped
    depends_on:
      operations-center-api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-8080}:80'

  operations-center-seq:
    image: datalust/seq:2024.3
    container_name: operations-center-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: 'Y'
    volumes:
      - operations-center-seq-data:/data
    ports:
      - '${SEQ_PORT:-5341}:80'

  operations-center-otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    container_name: operations-center-otel-collector
    restart: unless-stopped
    command: ['--config=/etc/otel-collector-config.yml']
    depends_on:
      operations-center-seq:
        condition: service_started
    volumes:
      - ./infra/observability/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      # OTLP gRPC receiver (API export target)
      - '${OTEL_GRPC_PORT:-4317}:4317'
      # OTLP HTTP receiver (optional, for manual/debug OTLP)
      - '${OTEL_HTTP_PORT:-4318}:4318'
      # Prometheus scrape endpoint exposed by the collector
      - '${OTEL_PROMETHEUS_PORT:-8889}:8889'

  operations-center-prometheus:
    image: prom/prometheus:v3.13.1
    container_name: operations-center-prometheus
    restart: unless-stopped
    depends_on:
      operations-center-otel-collector:
        condition: service_started
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - operations-center-prometheus-data:/prometheus
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'

  operations-center-grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: operations-center-grafana
    restart: unless-stopped
    depends_on:
      operations-center-prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - operations-center-grafana-data:/var/lib/grafana
    ports:
      - '${GRAFANA_PORT:-3000}:3000'

volumes:
  operations-center-postgres-data:
  operations-center-prometheus-data:
  operations-center-grafana-data:
  operations-center-seq-data:
